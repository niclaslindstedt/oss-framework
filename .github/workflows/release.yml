name: release

# Publishes the package to the GitHub Packages npm registry when a `v*` tag is
# pushed, and attaches a GitHub Release. Per OSS_SPEC §10.3 the tag is the
# single trigger; hand-pushed tags must be prevented out-of-band by tag
# protection rules so only an intentional release reaches this workflow. A
# `workflow_dispatch` escape hatch allows a manual re-run against an existing
# tag if a publish step fails.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Default to no privileges; each job opts into exactly what it needs.
permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Create the GitHub Release for the tag.
      contents: write
      # Publish the package to this repository's GitHub Packages registry. The
      # built-in GITHUB_TOKEN is scoped to the repo, so no long-lived npm
      # credential is needed.
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Stay in local/CI parity with the pinned toolchain (OSS_SPEC §10.5).
          node-version-file: .nvmrc
          # Authenticate npm against GitHub Packages and write the scoped
          # registry into .npmrc for the publish step below.
          registry-url: "https://npm.pkg.github.com"
          cache: npm

      - run: npm ci

      # Build on the exact tagged commit and gate the publish on a green suite.
      - run: make lint
      - run: make test
      - run: make build

      # Guard against tag/manifest drift: the tag must match package.json.
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          set -e
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      # Publish to GitHub Packages. `prepublishOnly` re-runs lint + test + build
      # as a final safety net. The scope (@niclaslindstedt) matches the repo
      # owner, which GitHub Packages requires.
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
