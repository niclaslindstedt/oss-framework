name: ci

on:
  push:
    branches: [main]
  pull_request:
    # Include `labeled` / `unlabeled` so the `no-changelog` escape hatch
    # re-runs the changeset job when the label is toggled after the PR
    # opened. The default activity types (`opened`, `synchronize`,
    # `reopened`) would otherwise leave the check stuck red until the next
    # push.
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: make fmt-check
      - run: make lint
      - run: make test
      - run: make build

  changeset:
    # Enforce that every PR touching the published `src/` surface drops a
    # changelog fragment under .changes/unreleased/, or opts out via the
    # `no-changelog` label. Pure refactors, CI/build tweaks, and docs-only
    # edits pass via the skip-list inside the script. The release workflow
    # consumes these fragments to compute the bump and collate CHANGELOG.md.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Check for changelog fragment
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: make check-changeset

  symlinks:
    # Enforce the OSS_SPEC §7.1 / §21.2 single-source-of-truth rule: the
    # tool-specific guidance files and the .claude/skills directory must be
    # symlinks, not copies that can drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify guidance symlinks resolve to AGENTS.md
        run: |
          set -e
          for link in CLAUDE.md GEMINI.md .cursorrules .github/copilot-instructions.md; do
            test -L "$link" || { echo "::error::$link must be a symlink"; exit 1; }
          done
          test "$(readlink CLAUDE.md)" = "AGENTS.md"
          test -L .claude/skills || { echo "::error::.claude/skills must be a symlink"; exit 1; }
          test "$(readlink .claude/skills)" = "../.agent/skills"
