<!doctype html>
<!-- `data-theme` seeds the default preset before the app mounts (the engine
     then keeps it in sync); the generated token blocks key off it. -->
<html lang="en" data-theme="githubDark">
  <head>
    <meta charset="UTF-8" />
    <!-- Lock the viewport scale: an installed PWA is an app, not a document, so
         pinch-zoom and (on iOS) the auto-zoom that fires when a sub-16px input
         is focused both misbehave — focusing a new checklist title or item
         zoomed in with no way back out. `maximum-scale=1, user-scalable=no`
         disables both; `viewport-fit=cover` lets the app paint under the
         notch / home indicator (it already pads with `env(safe-area-inset-*)`). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>OSS Framework — demo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
